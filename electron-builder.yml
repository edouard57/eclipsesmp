appId: 'com.eclipsesmp.launcher'
productName: 'Eclipse SMP Launcher'
artifactName: '${productName}-setup-${version}.${ext}'

copyright: 'Copyright © 2026 Eclipse SMP'

asar: true
compression: 'maximum'

files:
  - '!{dist,.gitignore,.vscode,docs,dev-app-update.yml,.nvmrc,eslint.config.mjs}'

extraResources:
  - 'libraries'

# Windows Configuration
win: 
  target: 
    - target: 'nsis'
      arch: 'x64'

# Windows Installer Configuration
nsis:
  oneClick: false
  perMachine: false
  allowElevation: true
  allowToChangeInstallationDirectory: true

# macOS Configuration
mac:
  target:
    - target: 'dmg'
      arch:
        - 'x64'
        - 'arm64'
  artifactName: '${productName}-setup-${version}-${arch}.${ext}'
  category: 'public.app-category.games'

# Linux Configuration
linux:
  target: 'AppImage'
  maintainer: 'Eclipse SMP'
  vendor: 'Eclipse SMP'
  synopsis: 'Launcher pour le serveur Eclipse SMP'
  description: 'Launcher dedie au serveur Eclipse SMP (Fabric 26.2). Mods, configuration et mises a jour geres automatiquement.'
  category: 'Game'


directories:
  buildResources: 'build'
  output: 'dist'

publish:
  provider: 'github'
  owner: 'edouard57'
  repo: 'eclipsesmp'
  # Keep as draft during CI: the 3 platform builds run in parallel and each
  # publish to the SAME release. Drafts don't create a real git tag, so
  # concurrent jobs can all find/update the same draft safely. A real
  # ("release") tag is created eagerly and races between parallel jobs
  # (one job's create fails with 422 "already_exists" if another job's
  # create lands microseconds earlier). The workflow's "publish-release"
  # job un-drafts it once, after all 3 platforms finish.